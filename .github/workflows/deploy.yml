name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # игнорируем коммиты бота, чтобы не было петли build → commit → build
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch photos from Google Drive
        run: npm run fetch:photos || echo "::warning::fetch:photos failed — using existing/placeholder images"

      - name: Build
        run: npm run build

      - name: Publish built site to docs/ on main
        run: |
          rm -rf docs
          mv dist docs
          touch docs/.nojekyll

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs

          if git diff --cached --quiet; then
            echo "Nothing to commit — site is up to date"
            exit 0
          fi

          git commit -m "build: refresh docs/ [skip ci]"
          git push origin HEAD:main
