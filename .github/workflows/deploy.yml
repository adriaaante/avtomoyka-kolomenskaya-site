name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # игнорируем коммиты бота, чтобы не было петли build → commit → build
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch photos from Google Drive
        run: npm run fetch:photos || echo "::warning::fetch:photos failed — using existing/placeholder images"

      - name: Build
        run: npm run build

      - name: Publish built site to docs/ on main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          rm -rf docs
          mv dist docs
          touch docs/.nojekyll

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs

          if git diff --cached --quiet; then
            echo "Nothing to commit — site is up to date"
            exit 0
          fi

          git commit -m "build: refresh docs/ [skip ci]"

          # Pull rebase in case someone pushed while we were building,
          # then push. Retry once on race.
          for attempt in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin HEAD:main; then
              echo "✓ Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt, retrying..."
            sleep $((attempt * 3))
          done
          echo "::error::Failed to push docs/ to main after 3 attempts. Check repo Settings → Actions → General → Workflow permissions = 'Read and write'."
          exit 1
