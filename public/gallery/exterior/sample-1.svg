<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Фото автомобиля после комплексной мойки">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0f15"/>
      <stop offset="0.6" stop-color="#11161f"/>
      <stop offset="1" stop-color="#1a2230"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="55%" r="55%">
      <stop offset="0" stop-color="#caa436" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#caa436" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dfe6f1"/>
      <stop offset="1" stop-color="#6f7a8a"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0f15"/>
      <stop offset="1" stop-color="#1a2230"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <rect width="1600" height="1000" fill="url(#spot)"/>
  <!-- floor reflection -->
  <ellipse cx="800" cy="800" rx="650" ry="30" fill="#000" opacity="0.6"/>
  <!-- car silhouette -->
  <g transform="translate(280,440)">
    <path d="M40 280 Q60 200 180 180 Q260 80 480 70 Q700 60 820 170 Q940 190 980 280 L990 360 L30 360 Z" fill="url(#body)"/>
    <path d="M210 180 Q280 110 470 100 Q660 95 770 175 L760 220 Q650 160 480 160 Q300 160 220 220 Z" fill="url(#window)"/>
    <circle cx="200" cy="370" r="70" fill="#0b0f15"/>
    <circle cx="200" cy="370" r="44" fill="#2a3445"/>
    <circle cx="800" cy="370" r="70" fill="#0b0f15"/>
    <circle cx="800" cy="370" r="44" fill="#2a3445"/>
    <!-- shine highlight -->
    <path d="M70 270 Q160 230 320 230 L800 230 Q900 240 950 280" stroke="#fff" stroke-opacity="0.55" stroke-width="3" fill="none"/>
  </g>
  <!-- watermark -->
  <g fill="#caa436" opacity="0.5">
    <text x="60" y="920" font-family="Manrope, sans-serif" font-size="28" font-weight="700" letter-spacing="0.2em">АВТОМОЙКА КОЛОМЕНСКАЯ</text>
    <text x="60" y="956" font-family="Manrope, sans-serif" font-size="18" letter-spacing="0.25em">EXTERIOR · COMPLEX WASH</text>
  </g>
</svg>
