<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Чистый салон автомобиля после химчистки">
  <defs>
    <linearGradient id="ibg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0f15"/>
      <stop offset="1" stop-color="#1a2230"/>
    </linearGradient>
    <linearGradient id="seat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4658"/>
      <stop offset="1" stop-color="#1a2230"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#ibg)"/>
  <!-- dashboard -->
  <path d="M0 200 Q800 100 1600 200 L1600 460 L0 460 Z" fill="#11161f"/>
  <!-- steering wheel -->
  <g transform="translate(800,470)">
    <circle r="160" fill="none" stroke="#2a3445" stroke-width="22"/>
    <circle r="40" fill="#11161f" stroke="#caa436" stroke-width="2"/>
    <rect x="-130" y="-10" width="260" height="20" fill="#2a3445"/>
    <rect x="-10" y="-130" width="20" height="120" fill="#2a3445"/>
  </g>
  <!-- seats -->
  <g transform="translate(280,540)">
    <rect width="380" height="380" rx="40" fill="url(#seat)"/>
    <rect x="20" y="20" width="340" height="180" rx="30" fill="#2a3445"/>
  </g>
  <g transform="translate(940,540)">
    <rect width="380" height="380" rx="40" fill="url(#seat)"/>
    <rect x="20" y="20" width="340" height="180" rx="30" fill="#2a3445"/>
  </g>
  <!-- screen -->
  <rect x="700" y="240" width="200" height="120" rx="12" fill="#000"/>
  <rect x="710" y="250" width="180" height="100" rx="6" fill="#caa436" opacity="0.3"/>
  <g fill="#caa436" opacity="0.5">
    <text x="60" y="920" font-family="Manrope, sans-serif" font-size="28" font-weight="700" letter-spacing="0.2em">АВТОМОЙКА КОЛОМЕНСКАЯ</text>
    <text x="60" y="956" font-family="Manrope, sans-serif" font-size="18" letter-spacing="0.25em">INTERIOR · DEEP CLEAN</text>
  </g>
</svg>
