<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Полировка кузова автомобиля">
  <defs>
    <radialGradient id="shine" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.3" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a3445"/>
      <stop offset="1" stop-color="#07090c"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#paint)"/>
  <ellipse cx="800" cy="500" rx="900" ry="600" fill="url(#shine)"/>
  <!-- polish swirls -->
  <g stroke="#caa436" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 200 600 Q 400 400 800 500 T 1400 600"/>
    <path d="M 200 660 Q 400 460 800 560 T 1400 660"/>
    <path d="M 250 720 Q 450 520 850 620 T 1450 720"/>
  </g>
  <!-- polisher pad -->
  <g transform="translate(800,500)">
    <circle r="180" fill="#11161f" stroke="#caa436" stroke-width="6"/>
    <circle r="150" fill="#caa436" opacity="0.15"/>
    <circle r="80" fill="#11161f"/>
    <circle r="20" fill="#caa436"/>
  </g>
  <g fill="#caa436" opacity="0.5">
    <text x="60" y="920" font-family="Manrope, sans-serif" font-size="28" font-weight="700" letter-spacing="0.2em">АВТОМОЙКА КОЛОМЕНСКАЯ</text>
    <text x="60" y="956" font-family="Manrope, sans-serif" font-size="18" letter-spacing="0.25em">POLISH · CERAMIC COATING</text>
  </g>
</svg>
